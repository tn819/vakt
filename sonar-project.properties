sonar.projectKey=tn819_agentctl
sonar.organization=tn819

# Sources
sonar.sources=src

# Exclusions
sonar.exclusions=**/node_modules/**,**/*.test.ts,**/dist/**,**/*.py

# TypeScript support
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage — generated by `bun test --coverage-reporter lcov`
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Commands are CLI entry points (Bun.spawn + process.stdin/stdout wiring).
# They are validated by e2e bats tests which don't emit LCOV.
# The logic they delegate to is unit-tested in src/daemon/ and src/lib/.
sonar.coverage.exclusions=src/commands/**
