name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview release without publishing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Only run on main branch push or manual dispatch
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    outputs:
      released: ${{ steps.tag-check.outputs.released }}
      version: ${{ steps.tag-check.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Run tests
        run: |
          export PATH="$PWD/src:$HOME/.bun/bin:$PATH"
          export AGENTS_SECRETS_BACKEND=env
          bun test src/
          bats tests/e2e/
          bun build src/index.ts --compile --outfile dist/vakt
          bats tests/e2e/binary.bats

      - name: Capture tag before release
        id: before-release
        run: echo "tag=$(git tag --sort=-version:refname | head -1)" >> $GITHUB_OUTPUT

      - name: Configure git for semantic-release
        run: git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: npx semantic-release
        if: github.event.inputs.dry_run != 'true'

      - name: Dry Run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release --dry-run
        if: github.event.inputs.dry_run == 'true'

      - name: Check if released
        id: tag-check
        if: github.event.inputs.dry_run != 'true'
        run: |
          git fetch --tags
          AFTER=$(git tag --sort=-version:refname | head -1)
          BEFORE="${{ steps.before-release.outputs.tag }}"
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "released=true" >> $GITHUB_OUTPUT
            echo "version=${AFTER#v}" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

  release-macos:
    runs-on: macos-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build macOS arm64 binary
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          bun build src/index.ts --compile --outfile dist/vakt
          tar -czf "vakt-${VERSION}-darwin-arm64.tar.gz" -C dist vakt
          shasum -a 256 "vakt-${VERSION}-darwin-arm64.tar.gz" > checksums-darwin.txt

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          gh release upload "v${VERSION}" \
            "vakt-${VERSION}-darwin-arm64.tar.gz" \
            "checksums-darwin.txt"

  release-homebrew:
    runs-on: ubuntu-latest
    needs: [release, release-macos]
    if: needs.release.outputs.released == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Check out main so the formula commit is based on the current branch
          # tip. Pushing directly from a detached tag fails GH006 (status checks
          # not yet run for that commit SHA). PR + auto-merge is the safe path.
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Compute SHAs and update formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          gh release download "v${VERSION}" --pattern "checksums-darwin.txt" --pattern "checksums.txt" --dir /tmp/checksums

          export SHA_DARWIN_ARM64=$(grep "darwin-arm64" /tmp/checksums/checksums-darwin.txt | awk '{print $1}')
          export SHA_LINUX_X86_64=$(grep "linux-x86_64" /tmp/checksums/checksums.txt | awk '{print $1}')

          python3 scripts/update-formula.py

      - name: Open PR for formula update
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          BRANCH="chore/formula-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Formula/vakt.rb
          git commit -m "chore(release): update homebrew formula to ${VERSION}"
          git push --force origin "$BRANCH"
          BODY="Automated formula update for release v${VERSION}.\n\nUpdates \`Formula/vakt.rb\` with the correct version and SHA-256 checksums for the published binaries.\n\n_This PR was opened automatically by the release workflow._"
          gh pr create \
            --title "chore(release): update homebrew formula to ${VERSION}" \
            --body "$(printf '%b' "$BODY")" \
            --base main \
            --head "$BRANCH"
          # Requires 'Allow auto-merge' enabled in repo Settings → General → Pull Requests.
          gh pr merge "$BRANCH" --squash --auto --delete-branch || true
