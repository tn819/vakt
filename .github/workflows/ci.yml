name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Validate JSON files
        run: |
          for file in $(find . -name "*.json" -not -path "*/node_modules/*" -type f); do
            python3 -m json.tool "$file" > /dev/null || (echo "Invalid JSON: $file" && exit 1)
          done

      - name: Validate shell scripts syntax
        run: |
          for file in $(find . -name "*.sh" -not -path "*/node_modules/*" -type f); do
            bash -n "$file" || (echo "Syntax error in: $file" && exit 1)
          done

      - name: Check skill files
        run: |
          for skill_dir in skills/*/; do
            [ -f "$skill_dir/SKILL.md" ] || (echo "Missing SKILL.md in $skill_dir" && exit 1)
            grep -q "^---" "$skill_dir/SKILL.md" || (echo "Missing YAML frontmatter in $skill_dir/SKILL.md" && exit 1)
          done

      - name: Check CLI entry point is executable and responds
        run: |
          chmod +x src/mcpctl.sh
          src/mcpctl.sh --version
          src/mcpctl.sh --help

      - name: Check installer script
        run: |
          chmod +x install.sh
          grep -q "#!/usr/bin/env bash" install.sh
          grep -q "curl" install.sh || grep -q "git clone" install.sh

  sonarcloud:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        continue-on-error: true
