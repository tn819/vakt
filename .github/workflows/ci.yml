name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Validate JSON files
        run: |
          for file in $(find . -name "*.json" -not -path "*/node_modules/*" -type f); do
            python3 -m json.tool "$file" > /dev/null || (echo "Invalid JSON: $file" && exit 1)
          done

      - name: Validate shell scripts syntax
        run: |
          for file in $(find . -name "*.sh" -not -path "*/node_modules/*" -type f); do
            bash -n "$file" || (echo "Syntax error in: $file" && exit 1)
          done

      - name: Check skill files
        run: |
          for skill_dir in skills/*/; do
            [ -f "$skill_dir/SKILL.md" ] || (echo "Missing SKILL.md in $skill_dir" && exit 1)
            grep -q "^---" "$skill_dir/SKILL.md" || (echo "Missing YAML frontmatter in $skill_dir/SKILL.md" && exit 1)
          done

      - name: Check CLI entry point responds
        run: |
          bun run src/index.ts --version
          bun run src/index.ts --help

      - name: Check installer script
        run: |
          chmod +x install.sh
          grep -q "#!/usr/bin/env bash" install.sh
          grep -q "curl" install.sh || grep -q "git clone" install.sh

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        continue-on-error: true

  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
