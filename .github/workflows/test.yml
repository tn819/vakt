name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install bats
        run: brew install bats-core

      - name: Run e2e tests
        run: |
          export PATH="$PWD/src:$HOME/.bun/bin:$PATH"
          export AGENTS_SECRETS_BACKEND=env
          bats tests/e2e/

      - name: Test CLI commands
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          export AGENTS_DIR="$HOME/.agents-test"
          export AGENTS_SECRETS_BACKEND=env

          bun run src/index.ts init
          [ -d "$AGENTS_DIR" ]
          [ -f "$AGENTS_DIR/config.json" ]

          bun run src/index.ts config list
          bun run src/index.ts config set paths.code ~/Projects

          bun run src/index.ts secrets set TEST_KEY "test_value"
          [ "$(bun run src/index.ts secrets get TEST_KEY)" = "test_value" ]

          bun run src/index.ts add-server test npx -y test-mcp
          bun run src/index.ts list servers | grep -q "test"

          bun run src/index.ts list

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Run e2e tests
        run: |
          export PATH="$PWD/src:$HOME/.bun/bin:$PATH"
          export AGENTS_SECRETS_BACKEND=env
          bats tests/e2e/

      - name: Test CLI commands
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          export AGENTS_DIR="$HOME/.agents-test"
          export AGENTS_SECRETS_BACKEND=env

          bun run src/index.ts init
          [ -d "$AGENTS_DIR" ]
          [ -f "$AGENTS_DIR/config.json" ]

          bun run src/index.ts config list
          bun run src/index.ts config set paths.code ~/Projects

          bun run src/index.ts secrets set TEST_KEY "test_value"
          [ "$(bun run src/index.ts secrets get TEST_KEY)" = "test_value" ]

          bun run src/index.ts add-server test npx -y test-mcp
          bun run src/index.ts list servers | grep -q "test"

          bun run src/index.ts list

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check shell scripts
        run: |
          find . -name "*.sh" -type f -exec bash -n {} \;

      - name: Check for TODO/FIXME
        run: |
          ! grep -r "TODO\|FIXME" src/ --include="*.ts" || (echo "Found TODO/FIXME comments" && exit 1)

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: |
          export AGENTS_SECRETS_BACKEND=env
          bun test src/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for hardcoded secrets
        run: |
          ! grep -rE "(password|token|api_key|secret)\s*=\s*['\"][^'\"]{10,}['\"]" src/ --include="*.ts" || (echo "Found hardcoded credentials" && exit 1)
          ! grep -rE "(ghp|gho|github_pat)_[a-zA-Z0-9]{36}" src/ --include="*.ts" || (echo "Found hardcoded GitHub tokens" && exit 1)

      - name: Check file permissions
        run: |
          world_writable=$(find . -type f -perm -002 -not -path "./.git/*" 2>/dev/null)
          if [ -n "$world_writable" ]; then
            echo "Found world-writable files:"
            echo "$world_writable"
            exit 1
          fi
          echo "✓ No world-writable files found"
